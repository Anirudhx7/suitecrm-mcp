<svg viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr-orange" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c45d25"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5c6280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="410" fill="#0d1118" rx="10"/>

  <!-- Identity Provider -->
  <rect x="12" y="30" width="155" height="80" rx="7" fill="#0d1118" stroke="#c45d25" stroke-width="1.5"/>
  <text x="89" y="64" text-anchor="middle" fill="#e8915a" font-size="11" font-weight="600">Auth0 / Azure AD</text>
  <text x="89" y="82" text-anchor="middle" fill="#9da3b8" font-size="10">Identity Provider</text>

  <!-- MCP Clients container -->
  <rect x="242" y="12" width="428" height="108" rx="8" fill="#0d1118" fill-opacity="0.5" stroke="rgba(196,93,37,0.4)" stroke-width="1.5"/>
  <text x="456" y="32" text-anchor="middle" fill="#eceef4" font-size="11" font-weight="600">MCP Clients</text>
  <rect x="257" y="40" width="118" height="66" rx="5" fill="#0d1118" stroke="rgba(196,93,37,0.35)" stroke-width="1"/>
  <text x="316" y="77" text-anchor="middle" fill="#eceef4" font-size="10" font-weight="500">Claude Desktop</text>
  <rect x="390" y="40" width="108" height="66" rx="5" fill="#0d1118" stroke="rgba(196,93,37,0.35)" stroke-width="1"/>
  <text x="444" y="77" text-anchor="middle" fill="#eceef4" font-size="10" font-weight="500">Claude Code</text>
  <rect x="514" y="40" width="140" height="66" rx="5" fill="#0d1118" stroke="rgba(196,93,37,0.35)" stroke-width="1"/>
  <text x="584" y="77" text-anchor="middle" fill="#eceef4" font-size="10" font-weight="500">OpenClaw</text>

  <!-- Gateway -->
  <rect x="12" y="182" width="656" height="72" rx="8" fill="#c45d25" fill-opacity="0.12" stroke="#c45d25" stroke-width="2"/>
  <text x="340" y="212" text-anchor="middle" fill="#e8915a" font-size="12" font-weight="700">suitecrm-mcp gateway</text>
  <text x="340" y="232" text-anchor="middle" fill="#9da3b8" font-size="10">OAuth2 · API keys · SSE</text>

  <!-- SuiteCRM Instances container -->
  <rect x="12" y="300" width="656" height="102" rx="8" fill="#0d1118" fill-opacity="0.5" stroke="rgba(196,93,37,0.35)" stroke-width="1.5"/>
  <text x="340" y="322" text-anchor="middle" fill="#eceef4" font-size="11" font-weight="600">SuiteCRM Instances</text>

  <!-- CRM A cylinder -->
  <ellipse cx="153" cy="382" rx="44" ry="8" fill="#111420" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <rect x="109" y="334" width="88" height="48" fill="#0d1118"/>
  <line x1="109" y1="334" x2="109" y2="382" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <line x1="197" y1="334" x2="197" y2="382" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <ellipse cx="153" cy="334" rx="44" ry="8" fill="#0d1118" stroke="rgba(196,93,37,0.5)" stroke-width="1.2"/>
  <text x="153" y="362" text-anchor="middle" fill="#eceef4" font-size="10.5" font-weight="500">CRM A</text>

  <!-- CRM B cylinder -->
  <ellipse cx="340" cy="382" rx="44" ry="8" fill="#111420" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <rect x="296" y="334" width="88" height="48" fill="#0d1118"/>
  <line x1="296" y1="334" x2="296" y2="382" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <line x1="384" y1="334" x2="384" y2="382" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <ellipse cx="340" cy="334" rx="44" ry="8" fill="#0d1118" stroke="rgba(196,93,37,0.5)" stroke-width="1.2"/>
  <text x="340" y="362" text-anchor="middle" fill="#eceef4" font-size="10.5" font-weight="500">CRM B</text>

  <!-- CRM X cylinder -->
  <ellipse cx="527" cy="382" rx="44" ry="8" fill="#111420" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <rect x="483" y="334" width="88" height="48" fill="#0d1118"/>
  <line x1="483" y1="334" x2="483" y2="382" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <line x1="571" y1="334" x2="571" y2="382" stroke="rgba(196,93,37,0.4)" stroke-width="1"/>
  <ellipse cx="527" cy="334" rx="44" ry="8" fill="#0d1118" stroke="rgba(196,93,37,0.5)" stroke-width="1.2"/>
  <text x="527" y="362" text-anchor="middle" fill="#eceef4" font-size="10.5" font-weight="500">CRM X</text>

  <!-- IdP -> Gateway (dashed) -->
  <line x1="89" y1="110" x2="89" y2="180" stroke="#5c6280" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>
  <text x="96" y="150" fill="#9da3b8" font-size="9">confirms identity (OAuth2)</text>

  <!-- Gateway -> Clients (issues API key, dashed) -->
  <line x1="350" y1="182" x2="350" y2="120" stroke="#5c6280" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>
  <text x="356" y="155" fill="#9da3b8" font-size="9">issues API key</text>

  <!-- MCP Clients -> Gateway -->
  <line x1="456" y1="120" x2="456" y2="180" stroke="#c45d25" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="462" y="157" fill="#9da3b8" font-size="9">Bearer token</text>

  <!-- Gateway -> SuiteCRM -->
  <line x1="340" y1="254" x2="340" y2="298" stroke="#c45d25" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="348" y="280" fill="#9da3b8" font-size="9">Hybrid v8 GraphQL (v4.1 Fallback)</text>
</svg>
