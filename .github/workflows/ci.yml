name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check server syntax
        run: |
          node --check server/index.mjs
          node --check server/auth.mjs
      - name: Check installer syntax
        run: python3 -m py_compile install.py install-bridge.py
      - name: Validate docker-compose config
        run: GRAFANA_PASSWORD=dummy docker compose config --quiet
      - name: Validate Prometheus rules
        run: |
          sudo apt-get install -y prometheus 2>/dev/null | tail -1
          promtool check rules monitoring/prometheus/rules.yml

  publish:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/anirudhx7/suitecrm-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
