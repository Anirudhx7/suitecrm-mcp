name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check server syntax
        run: node --check server/index.mjs
      - name: Check installer syntax
        run: python3 -m py_compile install-single.py install-multi.py
