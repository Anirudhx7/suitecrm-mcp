services:

  # ── Auth service ─────────────────────────────────────────────────────────────
  # Handles OAuth2/OIDC login and issues session tokens.
  # One instance per deployment (shared across all entities).
  suitecrm-mcp-auth:
    image: ghcr.io/anirudhx7/suitecrm-mcp:v4.4.0
    command: node auth.mjs
    working_dir: /app
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - suitecrm-state:/etc/suitecrm-mcp
      - ./entities.json:/etc/suitecrm-mcp/entities.json:ro   # copy from entities.example.json and edit
    environment:
      AUTH0_DOMAIN: your-tenant.auth0.com
      AUTH0_CLIENT_ID: your-client-id
      AUTH0_CLIENT_SECRET: your-client-secret
      AUTH0_AUDIENCE: https://your-api-identifier
      GATEWAY_PUBLIC_URL: https://mcp.yourdomain.com
      SESSION_TTL_DAYS: "30"
      PORT: "3100"
      METRICS_PORT: "9091"
      METRICS_BIND: "0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Gateway (single-entity Docker usage) ────────────────────────────────────
  # For multi-entity deployments use install.py (systemd) instead.
  # This service is kept for single-CRM / dev use.
  # NOTE: port 3101 binds to all interfaces. Put nginx/Caddy in front before
  # exposing this on a public VPS - the auth service alone does not protect
  # the SSE port from unauthenticated connection attempts.
  suitecrm-mcp:
    image: ghcr.io/anirudhx7/suitecrm-mcp:v4.4.0
    ports:
      - "127.0.0.1:3101:3101"   # change to "3101:3101" only behind a reverse proxy
    volumes:
      - suitecrm-state:/etc/suitecrm-mcp   # shared with auth service: sessions + user-profiles
    environment:
      SUITECRM_ENDPOINT: https://crm.example.com/legacy/service/v4_1/rest.php
      SUITECRM_PREFIX: suitecrm
      SUITECRM_CODE: crm1
      AUTH0_DOMAIN: your-tenant.auth0.com
      AUTH0_AUDIENCE: https://your-api-identifier
      REQUIRED_GROUP: crm1_users
      PORT: "3101"
      METRICS_PORT: "9090"
      METRICS_BIND: "0.0.0.0"   # expose to Prometheus container; bind to 127.0.0.1 when not using Docker
      # NODE_TLS_REJECT_UNAUTHORIZED: "0"  # only for self-signed certs
      # CIRCUIT_BREAKER_THRESHOLD: "5"     # failures before circuit opens
      # CIRCUIT_BREAKER_RESET_MS: "60000"  # recovery window ms
    depends_on:
      suitecrm-mcp-auth:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  # Optional monitoring stack. Remove this and grafana if you don't need metrics.
  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "127.0.0.1:9090:9090"   # localhost only - do not expose publicly
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.1
    ports:
      - "127.0.0.1:3000:3000"   # localhost only - do not expose publicly
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in your environment or a .env file}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    ports:
      - "127.0.0.1:3200:3100"   # host 3200 (3100 is taken by auth service)
    volumes:
      - ./monitoring/loki:/etc/loki:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    restart: unless-stopped

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    command: --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped

  # ── Promtail ─────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail:/etc/promtail:ro
      - promtail_positions:/promtail
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  suitecrm-state:     # shared runtime state: sessions.json, user-profiles.json
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
