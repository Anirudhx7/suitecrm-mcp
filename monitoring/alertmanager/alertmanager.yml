global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'entity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'null'

  # Uncomment and configure a receiver below to route alerts to email/Slack/PagerDuty.
  # routes:
  #   - receiver: 'slack'
  #     match:
  #       severity: critical

receivers:
  - name: 'null'

  # - name: 'slack'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
  #       channel: '#alerts'
  #       title: '{{ .GroupLabels.alertname }}'
  #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['entity']
