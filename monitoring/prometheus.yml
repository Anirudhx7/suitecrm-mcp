global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules.yml"

scrape_configs:
  # Single-entity Docker setup - scrapes the suitecrm-mcp container
  # METRICS_BIND must be set to 0.0.0.0 in docker-compose.yml for this to work
  - job_name: suitecrm-mcp
    static_configs:
      - targets: ['suitecrm-mcp:9090']
        labels:
          entity: default

  - job_name: suitecrm-mcp-auth
    static_configs:
      - targets: ['suitecrm-mcp-auth:9091']
        labels:
          service: auth

  # Multi-entity example (systemd installs - Prometheus runs on same host)
  # Metrics port = entity port + 6000 (set by install.py automatically)
  # Uncomment and adjust targets/labels for your entity codes and ports
  #
  # - job_name: suitecrm-mcp-crm1
  #   static_configs:
  #     - targets: ['127.0.0.1:9101']   # port 3101 + 6000
  #       labels:
  #         entity: crm1
  #
  # - job_name: suitecrm-mcp-crm2
  #   static_configs:
  #     - targets: ['127.0.0.1:9102']   # port 3102 + 6000
  #       labels:
  #         entity: crm2
